<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio Ultra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --key-color: #FA2D55; --bg-color: #FFFFFF; --secondary-bg: #F2F2F7; --text-main: #000000; --text-sub: #8E8E93; --border-color: #D1D1D6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: calc(15px + env(safe-area-inset-top)) 20px 10px; border-bottom: 0.5px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        h2 { margin: 0; font-size: 22px; font-weight: 800; }

        /* タブ */
        .tab-bar { display: flex; justify-content: space-around; padding: 10px; border-bottom: 0.5px solid var(--border-color); font-size: 13px; font-weight: 600; color: var(--text-sub); }
        .tab.active { color: var(--key-color); }

        .content-area { flex: 1; overflow-y: auto; padding-bottom: 160px; }
        .item-row { display: flex; align-items: center; padding: 10px 20px; border-bottom: 0.5px solid var(--border-color); background: white; }
        .list-art { width: 45px; height: 45px; border-radius: 6px; margin-right: 15px; object-fit: cover; background: var(--secondary-bg); }

        /* プレイヤー（Apple Music風） */
        .player-footer {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid var(--border-color); padding: 10px 20px calc(15px + env(safe-area-inset-bottom));
            box-sizing: border-box; z-index: 1000;
        }

        .player-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .controls-main { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .icon-btn { background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .icon-btn.active { color: var(--key-color); }
        .play-pause-circle { font-size: 35px; color: var(--text-main); }

        /* 歌詞・履歴モーダル */
        .full-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 2000; display: none;
            flex-direction: column; transition: 0.3s;
        }
        .modal-header { padding: calc(15px + env(safe-area-inset-top)) 20px 10px; border-bottom: 0.5px solid var(--border-color); display: flex; justify-content: space-between; }
        .lyrics-area { flex: 1; padding: 20px; overflow-y: auto; white-space: pre-wrap; font-size: 18px; font-weight: 700; line-height: 1.6; }
        .lyrics-editor { width: 100%; height: 100%; border: none; font-size: 16px; font-family: inherit; outline: none; resize: none; }

        .btn-ios { background: var(--secondary-bg); color: var(--key-color); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="view-title">ライブラリ</h2>
        <div>
            <input type="file" id="audio-upload" accept="audio/*,.m4a,.mp3" multiple style="display:none;">
            <label for="audio-upload" class="btn-ios" style="background: var(--key-color); color: white;">追加</label>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('library')">ライブラリ</div>
        <div class="tab" onclick="switchTab('playlists')">プレイリスト</div>
        <div class="tab" onclick="switchTab('history')">履歴</div>
    </div>

    <div class="content-area" id="main-content"></div>

    <div class="player-footer" id="player-bar" style="display: none;">
        <div class="player-top" onclick="showLyricsModal()">
            <img src="" id="np-art" class="now-playing-art" style="width:45px; height:45px; border-radius:5px;">
            <div style="flex:1; overflow:hidden;">
                <div id="np-title" style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">曲名</div>
                <div id="np-artist" style="font-size:11px; color:var(--text-sub);">アーティスト</div>
            </div>
            <button class="icon-btn" onclick="event.stopPropagation(); showLyricsModal()"><i class="fa-solid fa-quote-right"></i></button>
        </div>

        <div class="controls-main">
            <button id="shuffle-btn" class="icon-btn" onclick="toggleShuffle()"><i class="fa-solid fa-shuffle"></i></button>
            <button class="icon-btn" onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
            <button id="pp-btn" class="icon-btn play-pause-circle" onclick="togglePlay()"><i class="fa-solid fa-circle-play"></i></button>
            <button class="icon-btn" onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
            <button id="repeat-btn" class="icon-btn" onclick="toggleRepeat()"><i class="fa-solid fa-repeat"></i></button>
        </div>
        <audio id="audio-player"></audio>
    </div>

    <div class="full-modal" id="lyrics-modal">
        <div class="modal-header">
            <button class="btn-ios" onclick="closeLyricsModal()">閉じる</button>
            <h3 style="margin:0; font-size:16px;">歌詞</h3>
            <button class="btn-ios" id="lyrics-edit-btn" onclick="toggleLyricsEdit()">編集</button>
        </div>
        <div class="lyrics-area" id="lyrics-display">ここに歌詞が表示されます</div>
        <div id="lyrics-edit-container" style="display:none; flex:1; padding:20px;">
            <textarea id="lyrics-input" class="lyrics-editor" placeholder="ここに歌詞を入力してください..."></textarea>
            <button class="btn-ios" style="width:100%; margin-top:10px; background:var(--key-color); color:white;" onclick="saveLyrics()">保存</button>
        </div>
    </div>

    <script>
        let db, tracks = [], history = [], playlists = [], currentTab = 'library';
        let isShuffle = false, repeatMode = 0; // 0:なし, 1:全リピート, 2:1曲リピート
        let currentIndex = -1, isLyricsEditing = false;
        
        const player = document.getElementById('audio-player');
        const request = indexedDB.open("MusicStudioUltraV1", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            db.createObjectStore("history", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const trans = db.transaction(["songs", "history"], "readonly");
            trans.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            trans.objectStore("history").getAll().onsuccess = (e) => { history = e.target.result.reverse(); };
        }

        function render() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            let list = currentTab === 'library' ? tracks : (currentTab === 'history' ? history : []);
            
            list.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <img src="${track.cover || 'https://via.placeholder.com/150?text=♪'}" class="list-art">
                    <div style="flex:1" onclick="playTrack(${track.id})">
                        <div style="font-weight:600;">${track.name}</div>
                        <div style="font-size:12px; color:var(--text-sub)">${track.artist}</div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function playTrack(id) {
            const track = tracks.find(t => t.id === id);
            if(!track) return;
            currentIndex = tracks.indexOf(track);
            player.src = URL.createObjectURL(track.data);
            document.getElementById('np-title').textContent = track.name;
            document.getElementById('np-artist').textContent = track.artist;
            document.getElementById('np-art').src = track.cover || 'https://via.placeholder.com/150?text=♪';
            document.getElementById('player-bar').style.display = 'block';
            
            // 履歴に追加
            const trans = db.transaction(["history"], "readwrite");
            trans.objectStore("history").add({ ...track, id: undefined, originalId: track.id, time: new Date() });
            
            player.play();
            render();
        }

        // --- コントロール機能 ---
        function togglePlay() { 
            const btn = document.getElementById('pp-btn');
            if(player.paused) { player.play(); btn.innerHTML = '<i class="fa-solid fa-circle-pause"></i>'; }
            else { player.pause(); btn.innerHTML = '<i class="fa-solid fa-circle-play"></i>'; }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            const btn = document.getElementById('repeat-btn');
            btn.classList.toggle('active', repeatMode > 0);
            btn.innerHTML = repeatMode === 2 ? '<i class="fa-solid fa-repeat-1"></i>' : '<i class="fa-solid fa-repeat"></i>';
        }

        player.onended = () => {
            if(repeatMode === 2) { player.play(); }
            else { nextTrack(); }
        };

        function nextTrack() {
            let nextIndex = isShuffle ? Math.floor(Math.random() * tracks.length) : currentIndex + 1;
            if(nextIndex >= tracks.length) nextIndex = 0;
            playTrack(tracks[nextIndex].id);
        }

        function prevTrack() {
            let prevIndex = currentIndex - 1;
            if(prevIndex < 0) prevIndex = tracks.length - 1;
            playTrack(tracks[prevIndex].id);
        }

        // --- 歌詞機能 ---
        function showLyricsModal() {
            const track = tracks[currentIndex];
            document.getElementById('lyrics-display').textContent = track.lyrics || "歌詞が登録されていません。";
            document.getElementById('lyrics-modal').style.display = 'flex';
        }

        function toggleLyricsEdit() {
            isLyricsEditing = !isLyricsEditing;
            document.getElementById('lyrics-display').style.display = isLyricsEditing ? 'none' : 'block';
            document.getElementById('lyrics-edit-container').style.display = isLyricsEditing ? 'flex' : 'none';
            if(isLyricsEditing) document.getElementById('lyrics-input').value = tracks[currentIndex].lyrics || "";
        }

        function saveLyrics() {
            const newLyrics = document.getElementById('lyrics-input').value;
            tracks[currentIndex].lyrics = newLyrics;
            const trans = db.transaction(["songs"], "readwrite");
            trans.objectStore("songs").put(tracks[currentIndex]);
            trans.oncomplete = () => { toggleLyricsEdit(); showLyricsModal(); };
        }

        function closeLyricsModal() { document.getElementById('lyrics-modal').style.display = 'none'; isLyricsEditing = false; }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.includes(tab === 'library' ? 'ライブラリ' : (tab === 'history' ? '履歴' : 'プレイリスト'))));
            loadAll();
        }

        // 追加処理
        document.getElementById('audio-upload').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) await processFile(file);
            loadAll();
        });

        async function processFile(file) {
            return new Promise((resolve) => {
                jsmediatags.read(file, {
                    onSuccess: (tag) => {
                        const t = tag.tags; let cv = null;
                        if (t.picture) {
                            const d = t.picture.data; let s = "";
                            for (let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            cv = `data:${t.picture.format};base64,${btoa(s)}`;
                        }
                        const trans = db.transaction(["songs"], "readwrite");
                        trans.objectStore("songs").add({ name: t.title || file.name.replace(/\.[^/.]+$/, ""), artist: t.artist || "不明なアーティスト", cover: cv, data: file, lyrics: "" });
                        trans.oncomplete = () => resolve();
                    },
                    onError: () => {
                        const trans = db.transaction(["songs"], "readwrite");
                        trans.objectStore("songs").add({ name: file.name.replace(/\.[^/.]+$/, ""), artist: "不明なアーティスト", cover: null, data: file, lyrics: "" });
                        trans.oncomplete = () => resolve();
                    }
                });
            });
        }
    </script>
</body>
</html>
