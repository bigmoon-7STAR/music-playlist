<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --key-color: #FA2D55; --bg-color: #FFFFFF; --secondary-bg: #F2F2F7; --text-sub: #8E8E93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ヘッダー・検索（スマホで押しやすいサイズ） */
        .header { padding: calc(40px + env(safe-area-inset-top)) 20px 10px; background: white; }
        h2 { margin: 0; font-size: 28px; font-weight: 800; }
        
        .search-area { padding: 0 20px 15px; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 10px 15px; border-radius: 12px; border: none; background: var(--secondary-bg); font-size: 16px; }

        .tabs { display: flex; padding: 0 20px; border-bottom: 0.5px solid #D1D1D6; gap: 20px; }
        .tab { padding: 10px 0; font-size: 15px; font-weight: 600; color: var(--text-sub); border-bottom: 2px solid transparent; }
        .tab.active { color: var(--key-color); border-bottom-color: var(--key-color); }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { cursor: pointer; }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; background: #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-title { font-size: 14px; font-weight: 600; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- ミニプレイヤー (iOS風) --- */
        .mini-player {
            position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 10px; right: 10px;
            height: 60px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 12px; display: none; align-items: center; padding: 0 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 1000;
        }
        .mini-img { width: 40px; height: 40px; border-radius: 5px; margin-right: 12px; }

        /* --- フルスクリーンプレイヤー --- */
        .full-player {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); transform: translateY(100%);
        }
        .full-player.active { transform: translateY(0); display: flex; }
        #bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(50px) brightness(0.6); background-size: cover; background-position: center; transition: 1s; }

        .player-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        
        /* 3つの表示セクション */
        .view-sec { width: 100%; display: none; animation: fadeIn 0.3s; }
        .view-sec.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-art { width: 85vw; height: 85vw; max-width: 320px; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin: 0 auto; display: block; }
        
        .history-list { height: 40vh; overflow-y: auto; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; }
        .history-item { display: flex; align-items: center; padding: 10px; border-bottom: 0.5px solid rgba(255,255,255,0.1); color: white; }

        .controls { padding: 40px; width: 100%; color: white; }
        .mode-tabs { display: flex; justify-content: center; gap: 40px; margin-top: 20px; opacity: 0.5; font-size: 20px; }
        .mode-tab.active { opacity: 1; color: var(--key-color); }

        .btn-ios-circle { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--secondary-bg); color: var(--key-color); font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="title-text">ライブラリ</h2>
            <button class="btn-ios-circle" onclick="document.getElementById('audio-upload').click()"><i class="fa-solid fa-plus"></i></button>
            <input type="file" id="audio-upload" multiple style="display:none">
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="q" class="search-input" placeholder="曲・アーティストを検索" oninput="render()">
        <select id="sort" style="border:none; background:none; color:var(--key-color); font-weight:600;" onchange="render()">
            <option value="new">追加順</option>
            <option value="date">発行日順</option>
        </select>
    </div>

    <div class="tabs">
        <div class="tab active" id="t-lib" onclick="setTab('lib')">ライブラリ</div>
        <div class="tab" id="t-pl" onclick="setTab('pl')">プレイリスト</div>
    </div>

    <div class="content" id="main"></div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" class="mini-img">
        <div style="flex:1; overflow:hidden; font-weight:600; font-size:14px;" id="m-title">曲名</div>
        <button onclick="event.stopPropagation(); toggle();" style="background:none; border:none; font-size:24px;"><i id="m-pp" class="fa-solid fa-play"></i></button>
    </div>

    <div class="full-player" id="full">
        <div id="bg-blur"></div>
        <div style="padding: 15px; text-align: center;"><button onclick="closeFull()" style="width:40px; height:5px; border-radius:3px; background:rgba(255,255,255,0.3); border:none;"></button></div>
        
        <div class="player-body">
            <div id="v-art" class="view-sec active">
                <img id="f-img" class="main-art">
                <div style="color:white; margin-top:30px; width:100%;">
                    <div id="f-title" style="font-size:24px; font-weight:800;"></div>
                    <div id="f-artist" style="font-size:18px; color:var(--key-color);" onclick="editArtist()"></div>
                    <div id="f-date" style="font-size:13px; opacity:0.6; margin-top:5px;" onclick="editDate()"></div>
                </div>
            </div>

            <div id="v-lyric" class="view-sec">
                <div id="f-lyric-text" style="color:white; font-size:22px; font-weight:700; height:50vh; overflow-y:auto; line-height:1.6;"></div>
            </div>

            <div id="v-his" class="view-sec">
                <h3 style="color:white; margin-bottom:15px;">履歴</h3>
                <div class="history-list" id="his-list"></div>
            </div>
        </div>

        <div class="controls">
            <div style="display:flex; justify-content:space-around; align-items:center; margin-bottom:30px;">
                <i class="fa-solid fa-backward-step" style="font-size:30px;" onclick="prev()"></i>
                <i id="f-pp" class="fa-solid fa-play" style="font-size:60px;" onclick="toggle()"></i>
                <i class="fa-solid fa-forward-step" style="font-size:30px;" onclick="next()"></i>
            </div>
            <div class="mode-tabs">
                <i class="fa-solid fa-quote-right mode-tab" id="b-lyric" onclick="setMode('lyric')"></i>
                <i class="fa-solid fa-compact-disc mode-tab active" id="b-art" onclick="setMode('art')"></i>
                <i class="fa-solid fa-list-ul mode-tab" id="b-his" onclick="setMode('his')"></i>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        let db, tracks = [], history = [], curTab = 'lib', curIdx = -1;
        const player = document.getElementById('audio');

        const req = indexedDB.open("MusicStudioFinalDB", 5);
        req.onsuccess = (e) => { db = e.target.result; load(); };
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
        };

        function load() {
            db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
        }

        function render() {
            const main = document.getElementById('main');
            main.innerHTML = '';
            const q = document.getElementById('q').value.toLowerCase();
            const sort = document.getElementById('sort').value;

            let list = [...tracks].filter(t => t.name.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q));
            if(sort === 'date') list.sort((a,b) => (b.releaseDate||"").localeCompare(a.releaseDate||""));
            else list.sort((a,b) => b.id - a.id);

            const grid = document.createElement('div'); grid.className = 'grid';
            list.forEach(t => {
                const d = document.createElement('div'); d.className = 'card';
                d.innerHTML = `<img src="${t.cover||''}" class="card-img"><div class="card-title">${t.name}</div>`;
                d.onclick = () => play(t.id);
                grid.appendChild(d);
            });
            main.appendChild(grid);
        }

        function play(id) {
            const t = tracks.find(x => x.id === id);
            curIdx = tracks.indexOf(t);
            player.src = URL.createObjectURL(t.data);
            
            // UI Update
            document.getElementById('f-title').innerText = t.name;
            document.getElementById('f-artist').innerText = t.artist || 'アーティスト名を編集';
            document.getElementById('f-date').innerText = t.releaseDate ? `発行日: ${t.releaseDate}` : '発行日を設定';
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('m-title').innerText = t.name;
            document.getElementById('m-img').src = t.cover || '';
            document.getElementById('bg-blur').style.backgroundImage = `url(${t.cover})`;
            document.getElementById('f-lyric-text').innerText = t.lyrics || '歌詞がありません';
            
            document.getElementById('mini').style.display = 'flex';
            player.play();
            
            // 履歴に追加
            history.unshift(t);
            if(history.length > 20) history.pop();
            renderHistory();
        }

        function setMode(m) {
            document.querySelectorAll('.view-sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('v-'+m).classList.add('active');
            document.getElementById('b-'+m).classList.add('active');
        }

        function renderHistory() {
            const h = document.getElementById('his-list');
            h.innerHTML = history.map(t => `<div class="history-item"><img src="${t.cover}" style="width:30px;height:30px;margin-right:10px;border-radius:3px;">${t.name}</div>`).join('');
        }

        function toggle() { player.paused ? player.play() : player.pause(); }
        player.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        player.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };

        function openFull() { document.getElementById('full').classList.add('active'); }
        function closeFull() { document.getElementById('full').classList.remove('active'); }
        function setTab(t) { curTab = t; render(); }
        function next() { curIdx++; if(curIdx>=tracks.length) curIdx=0; play(tracks[curIdx].id); }
        function prev() { curIdx--; if(curIdx<0) curIdx=tracks.length-1; play(tracks[curIdx].id); }

        function editArtist() {
            let n = prompt("アーティスト名", tracks[curIdx].artist);
            if(n) { tracks[curIdx].artist = n; updateDB(tracks[curIdx]); }
        }
        function editDate() {
            let d = prompt("発行日 (YYYY-MM-DD)", tracks[curIdx].releaseDate);
            if(d) { tracks[curIdx].releaseDate = d; updateDB(tracks[curIdx]); }
        }
        function updateDB(t) {
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = load;
        }

        document.getElementById('audio-upload').onchange = async (e) => {
            for (let f of e.target.files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = "";
                        for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    db.transaction("songs","readwrite").objectStore("songs").add({name:tag.tags.title||f.name, artist:tag.tags.artist||"", cover:c, data:f, releaseDate:tag.tags.year||"", lyrics:""}).oncomplete = load;
                }});
            }
        };
    </script>
</body>
</html>
