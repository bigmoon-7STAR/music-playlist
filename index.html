<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --key-color: #FA2D55; --bg-color: #FFFFFF; --secondary-bg: #F2F2F7; --text-sub: #8E8E93; --danger: #FF3B30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; background: var(--bg-color); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ライブラリUI */
        .header { padding: calc(40px + env(safe-area-inset-top)) 20px 10px; background: white; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 15px; padding: 20px; padding-bottom: 160px; }
        
        /* カードのデザイン */
        .card { position: relative; width: 100%; cursor: pointer; }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; box-shadow: 0 8px 16px rgba(0,0,0,0.1); transition: 0.2s; }
        .card:active .card-img { transform: scale(0.96); opacity: 0.8; }

        /* 削除ボタン（カード右上に配置） */
        .del-btn {
            position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border: none; opacity: 0; transition: opacity 0.3s;
        }
        .edit-mode .del-btn { opacity: 1; } /* 編集モード時のみ表示 */

        /* 編集ボタン */
        .edit-toggle { background: none; border: none; color: var(--key-color); font-weight: 600; font-size: 16px; }

        /* ミニ・フルプレイヤー（前回同様） */
        .mini-player { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 12px; right: 12px; height: 64px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(30px); border-radius: 14px; display: none; align-items: center; padding: 0 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; }
        .full-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 2000; display: none; flex-direction: column; transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); transform: translateY(100%); touch-action: none; }
        .full-player.active { transform: translateY(0); display: flex; }
        #bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(80px) brightness(0.5); background-size: cover; background-position: center; }
        .main-art { width: 82vw; height: 82vw; max-width: 340px; border-radius: 14px; object-fit: contain; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .controls { padding: 20px 40px calc(40px + env(safe-area-inset-bottom)); width: 100%; color: white; }
    </style>
</head>
<body class="">

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="edit-toggle" id="edit-btn" onclick="toggleEdit()">編集</button>
            <h2 id="view-title" style="margin:0; font-size: 20px;">ライブラリ</h2>
            <button onclick="document.getElementById('audio-upload').click()" style="background:none; border:none; color:var(--key-color); font-size:26px;"><i class="fa-solid fa-circle-plus"></i></button>
        </div>
    </div>

    <div id="main" style="overflow-y:auto; flex:1;"></div>

    <input type="file" id="audio-upload" multiple style="display:none">

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" style="width:44px; height:44px; border-radius:6px; margin-right:12px; object-fit:cover;">
        <div style="flex:1; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" id="m-title"></div>
        <i id="m-pp" class="fa-solid fa-play" style="font-size:22px; padding:10px;" onclick="event.stopPropagation(); toggle();"></i>
    </div>

    <div class="full-player" id="full">
        <div id="bg-blur"></div>
        <div id="drag-handle" style="padding: 15px; text-align: center;"><div style="width:36px; height:5px; border-radius:3px; background:rgba(255,255,255,0.3); margin:0 auto;"></div></div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 35px;">
            <img id="f-img" class="main-art">
            <div style="width:100%; margin-top:40px; color:white;">
                <div id="f-title" style="font-size:24px; font-weight:800;"></div>
                <div id="f-artist" style="font-size:19px; color:var(--key-color); margin-top:4px;"></div>
            </div>
        </div>
        <div class="controls">
            <div style="display:flex; justify-content:space-around; align-items:center; margin-bottom:40px;">
                <i class="fa-solid fa-backward-step" style="font-size:32px;" onclick="prev()"></i>
                <i id="f-pp" class="fa-solid fa-play" style="font-size:60px;" onclick="toggle()"></i>
                <i class="fa-solid fa-forward-step" style="font-size:32px;" onclick="next()"></i>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        let db, tracks = [], isEditMode = false, curIdx = -1;
        const player = document.getElementById('audio');

        const req = indexedDB.open("MusicStudioFinalDB", 6);
        req.onsuccess = (e) => { db = e.target.result; load(); };

        function load() {
            db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => {
                tracks = e.target.result; render();
            };
        }

        function render() {
            const main = document.getElementById('main');
            const container = document.body;
            if(isEditMode) container.classList.add('edit-mode'); else container.classList.remove('edit-mode');

            main.innerHTML = '<div class="grid">' + tracks.map(t => `
                <div class="card" onclick="handleCardClick(${t.id})">
                    <img src="${t.cover||''}" class="card-img">
                    <button class="del-btn" onclick="event.stopPropagation(); deleteTrack(${t.id})">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <div style="margin-top:8px; font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.name}</div>
                    <div style="font-size:12px; color:var(--text-sub);">${t.artist||'不明'}</div>
                </div>`).join('') + '</div>';
        }

        function toggleEdit() {
            isEditMode = !isEditMode;
            document.getElementById('edit-btn').innerText = isEditMode ? '完了' : '編集';
            render();
        }

        function handleCardClick(id) {
            if (isEditMode) return; // 編集モード中は再生しない
            play(id);
        }

        function deleteTrack(id) {
            if (confirm("この曲をライブラリから削除しますか？")) {
                const trans = db.transaction("songs", "readwrite");
                trans.objectStore("songs").delete(id).onsuccess = () => {
                    load();
                    // 再生中の曲が消されたら止める
                    if (tracks[curIdx] && tracks[curIdx].id === id) {
                        player.pause();
                        document.getElementById('mini').style.display = 'none';
                    }
                };
            }
        }

        function play(id) {
            const t = tracks.find(x => x.id === id);
            curIdx = tracks.indexOf(t);
            player.src = URL.createObjectURL(t.data);
            document.getElementById('f-title').innerText = t.name;
            document.getElementById('f-artist').innerText = t.artist || '不明';
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('m-title').innerText = t.name;
            document.getElementById('m-img').src = t.cover || '';
            document.getElementById('bg-blur').style.backgroundImage = `url(${t.cover})`;
            document.getElementById('mini').style.display = 'flex';
            player.play();
        }

        // フルプレイヤーのスワイプ・操作（前回同様）
        const full = document.getElementById('full');
        let startY = 0;
        full.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, { passive: true });
        full.addEventListener('touchmove', (e) => {
            let diff = e.touches[0].clientY - startY;
            if (diff > 0) { full.style.transform = `translateY(${diff}px)`; full.style.transition = 'none'; }
        }, { passive: true });
        full.addEventListener('touchend', (e) => {
            let diff = e.changedTouches[0].clientY - startY;
            full.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            if (diff > 120) closeFull(); else full.style.transform = 'translateY(0)';
        });
        function openFull() { full.classList.add('active'); }
        function closeFull() { full.classList.remove('active'); setTimeout(() => { full.style.transform = ''; }, 400); }
        function toggle() { player.paused ? player.play() : player.pause(); }
        player.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        player.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };
        function next() { curIdx = (curIdx + 1) % tracks.length; play(tracks[curIdx].id); }
        function prev() { curIdx = (curIdx - 1 + tracks.length) % tracks.length; play(tracks[curIdx].id); }

        document.getElementById('audio-upload').onchange = async (e) => {
            for (let f of e.target.files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = "";
                        for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    db.transaction("songs","readwrite").objectStore("songs").add({name:tag.tags.title||f.name, artist:tag.tags.artist||"", cover:c, data:f, releaseDate:tag.tags.year||"", lyrics:""}).oncomplete = load;
                }});
            }
        };
    </script>
</body>
</html>
