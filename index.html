<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --key-color: #FA2D55; --bg-color: #FFFFFF; --secondary-bg: #F2F2F7; --text-main: #000000; --text-sub: #8E8E93; --border-color: #D1D1D6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: calc(20px + env(safe-area-inset-top)) 20px 10px; border-bottom: 0.5px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        h2 { margin: 0; font-size: 24px; font-weight: 800; cursor: pointer; }

        /* タブ切り替え */
        .tab-bar { display: flex; justify-content: space-around; padding: 10px; border-bottom: 0.5px solid var(--border-color); font-size: 14px; font-weight: 600; color: var(--text-sub); }
        .tab { padding: 5px 15px; cursor: pointer; }
        .tab.active { color: var(--key-color); border-bottom: 2px solid var(--key-color); }

        .content-area { flex: 1; overflow-y: auto; padding-bottom: 120px; }

        /* リストアイテム */
        .item-row { display: flex; align-items: center; padding: 10px 20px; border-bottom: 0.5px solid var(--border-color); background: white; position: relative; }
        .list-art { width: 45px; height: 45px; border-radius: 6px; margin-right: 15px; object-fit: cover; background: var(--secondary-bg); }
        .info-block { flex: 1; overflow: hidden; }
        .main-text { font-size: 16px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* プレイリスト追加用UI */
        .playlist-select-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 80%; border-radius: 15px; padding: 20px; max-height: 70%; overflow-y: auto; }

        /* プレイヤー */
        .player-footer { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid var(--border-color); padding: 10px 20px calc(15px + env(safe-area-inset-bottom)); box-sizing: border-box; display: flex; align-items: center; gap: 12px; z-index: 100; }
        .now-playing-art { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .btn-ios { background: var(--secondary-bg); color: var(--key-color); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="view-title">ライブラリ</h2>
        <div>
            <button class="btn-ios" onclick="showPlaylistInput()" id="add-pl-btn" style="display:none;">新規作成</button>
            <input type="file" id="audio-upload" accept="audio/*,.m4a,.mp3" multiple style="display:none;">
            <label for="audio-upload" class="btn-ios" style="background: var(--key-color); color: white;">追加</label>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('library')">すべての曲</div>
        <div class="tab" onclick="switchTab('playlists')">プレイリスト</div>
    </div>

    <div class="content-area" id="main-content"></div>

    <div class="playlist-select-modal" id="pl-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>プレイリストに追加</h3>
            <div id="modal-pl-list"></div>
            <button class="btn-ios" onclick="closeModal()" style="width:100%; margin-top:10px;">キャンセル</button>
        </div>
    </div>

    <div class="player-footer" id="player-bar" style="display: none;">
        <img src="" id="np-art" class="now-playing-art">
        <div style="flex:1; overflow:hidden;"><div id="np-title" style="font-weight:600; font-size:14px;">曲名</div></div>
        <button onclick="togglePlay()" id="pp-btn" style="background:none; border:none; font-size:28px;">▶︎</button>
        <audio id="audio-player"></audio>
    </div>

    <script>
        let db, tracks = [], playlists = [], currentTab = 'library', currentPlaylistId = null;
        const mainContent = document.getElementById('main-content');
        const player = document.getElementById('audio-player');

        const request = indexedDB.open("MusicStudioV4", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            db.createObjectStore("playlists", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const trans = db.transaction(["songs", "playlists"], "readonly");
            trans.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; };
            trans.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
        }

        function switchTab(tab) {
            currentTab = tab;
            currentPlaylistId = null;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.includes(tab === 'library' ? '曲' : 'プレイリスト')));
            document.getElementById('view-title').textContent = tab === 'library' ? 'ライブラリ' : 'プレイリスト';
            document.getElementById('add-pl-btn').style.display = tab === 'playlists' ? 'inline-block' : 'none';
            render();
        }

        function render() {
            mainContent.innerHTML = '';
            if (currentTab === 'library') {
                renderList(tracks, true);
            } else if (currentTab === 'playlists' && currentPlaylistId === null) {
                renderPlaylistsMenu();
            } else {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                const plTracks = tracks.filter(t => pl.songIds.includes(t.id));
                renderList(plTracks, false);
            }
        }

        function renderList(list, showAddBtn) {
            list.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <img src="${track.cover || 'https://via.placeholder.com/150?text=♪'}" class="list-art">
                    <div class="info-block" onclick="playTrackFromList('${track.id}', '${list.map(t=>t.id).join(',')}')">
                        <div class="main-text">${track.name}</div>
                        <div style="font-size:12px; color:var(--text-sub)">${track.artist}</div>
                    </div>
                    ${showAddBtn ? `<button onclick="openAddToPlaylist(${track.id})" style="border:none; background:none; color:var(--key-color); font-size:20px;">＋</button>` : ''}
                `;
                mainContent.appendChild(row);
            });
        }

        function renderPlaylistsMenu() {
            playlists.forEach(pl => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="list-art" style="background:#ddd; display:flex; align-items:center; justify-content:center; font-size:20px;">📁</div>
                    <div class="info-block" onclick="openPlaylist(${pl.id})">
                        <div class="main-text">${pl.name}</div>
                        <div style="font-size:12px; color:var(--text-sub)">${pl.songIds.length}曲</div>
                    </div>
                    <button onclick="deletePlaylist(${pl.id})" style="border:none; background:none; color:var(--text-sub);">消去</button>
                `;
                mainContent.appendChild(row);
            });
        }

        // プレイリスト作成
        function showPlaylistInput() {
            const name = prompt("プレイリスト名を入力してください");
            if (!name) return;
            const trans = db.transaction(["playlists"], "readwrite");
            trans.objectStore("playlists").add({ name: name, songIds: [] });
            trans.oncomplete = () => loadAll();
        }

        // プレイリストに曲を追加
        let targetSongId = null;
        function openAddToPlaylist(id) {
            targetSongId = id;
            const modalList = document.getElementById('modal-pl-list');
            modalList.innerHTML = '';
            playlists.forEach(pl => {
                const btn = document.createElement('button');
                btn.className = 'btn-ios';
                btn.style = 'width:100%; margin-bottom:10px; text-align:left;';
                btn.textContent = pl.name;
                btn.onclick = () => addToPL(pl.id);
                modalList.appendChild(btn);
            });
            document.getElementById('pl-modal').style.display = 'flex';
        }

        function addToPL(plId) {
            const pl = playlists.find(p => p.id === plId);
            if (!pl.songIds.includes(targetSongId)) {
                pl.songIds.push(targetSongId);
                const trans = db.transaction(["playlists"], "readwrite");
                trans.objectStore("playlists").put(pl);
                trans.oncomplete = () => { closeModal(); loadAll(); alert("追加しました"); };
            } else { alert("既に追加されています"); }
        }

        function openPlaylist(id) { currentPlaylistId = id; render(); }
        function closeModal() { document.getElementById('pl-modal').style.display = 'none'; }

        // --- 基本再生機能 ---
        function playTrackFromList(songId, currentListIds) {
            const track = tracks.find(t => t.id == songId);
            player.src = URL.createObjectURL(track.data);
            document.getElementById('np-title').textContent = track.name;
            document.getElementById('np-art').src = track.cover || 'https://via.placeholder.com/150?text=♪';
            document.getElementById('player-bar').style.display = 'flex';
            player.play();
        }

        function togglePlay() { player.paused ? player.play() : player.pause(); }
        player.onplay = () => document.getElementById('pp-btn').textContent = '⏸';
        player.onpause = () => document.getElementById('pp-btn').textContent = '▶︎';

        // 追加処理 (jsmediatags)
        document.getElementById('audio-upload').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) await processFile(file);
            loadAll();
        });

        async function processFile(file) {
            return new Promise((resolve) => {
                jsmediatags.read(file, {
                    onSuccess: (tag) => {
                        const t = tag.tags; let cv = null;
                        if (t.picture) {
                            const d = t.picture.data; let s = "";
                            for (let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            cv = `data:${t.picture.format};base64,${btoa(s)}`;
                        }
                        const trans = db.transaction(["songs"], "readwrite");
                        trans.objectStore("songs").add({ name: t.title || file.name.replace(/\.[^/.]+$/, ""), artist: t.artist || "不明なアーティスト", cover: cv, data: file });
                        trans.oncomplete = () => resolve();
                    },
                    onError: () => {
                        const trans = db.transaction(["songs"], "readwrite");
                        trans.objectStore("songs").add({ name: file.name.replace(/\.[^/.]+$/, ""), artist: "不明なアーティスト", cover: null, data: file });
                        trans.oncomplete = () => resolve();
                    }
                });
            });
        }
    </script>
</body>
</html>
