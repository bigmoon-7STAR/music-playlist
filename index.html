<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --key-color: #FA2D55;
            --bg-color: #FFFFFF;
            --secondary-bg: #F2F2F7;
            --text-main: #000000;
            --text-sub: #8E8E93;
            --border-color: #D1D1D6;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ヘッダー */
        .header {
            padding: calc(20px + env(safe-area-inset-top)) 20px 10px;
            background: var(--bg-color); border-bottom: 0.5px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        h2 { margin: 0; font-size: 24px; font-weight: 800; }

        /* ボタン類 */
        .btn-ios {
            background: var(--secondary-bg); color: var(--key-color);
            border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 14px;
        }
        .btn-ios.active { background: var(--key-color); color: white; }

        /* リストエリア */
        .playlist-container { flex: 1; overflow-y: auto; padding-bottom: 120px; }

        /* スワイプ削除のための構造 */
        .track-wrapper {
            position: relative; overflow: hidden; border-bottom: 0.5px solid var(--border-color);
            background-color: #ff3b30; /* 削除ボタンの背景色 */
        }

        .track-item {
            display: flex; align-items: center; padding: 10px 20px;
            background: var(--bg-color); position: relative; z-index: 2;
            transition: transform 0.3s ease;
        }

        /* 選択モード時のチェックボックス */
        .select-checkbox {
            display: none; width: 22px; height: 22px; margin-right: 15px;
            border: 2px solid var(--border-color); border-radius: 50%;
        }
        body.edit-mode .select-checkbox { display: block; }
        .select-checkbox.checked { background: var(--key-color); border-color: var(--key-color); }

        .list-art { width: 45px; height: 45px; border-radius: 6px; margin-right: 15px; object-fit: cover; background: var(--secondary-bg); }
        .track-info-block { flex: 1; overflow: hidden; }
        .track-name { font-size: 16px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .track-artist { font-size: 13px; color: var(--text-sub); }

        /* 削除ボタン（スワイプで出る） */
        .swipe-delete-btn {
            position: absolute; right: 0; top: 0; height: 100%; width: 80px;
            background: #ff3b30; color: white; display: flex; align-items: center;
            justify-content: center; font-weight: 600; z-index: 1;
        }

        /* 下部ツールバー（選択モード用） */
        .edit-toolbar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: var(--secondary-bg); border-top: 0.5px solid var(--border-color);
            display: none; justify-content: space-around; align-items: center; z-index: 200;
        }
        body.edit-mode .edit-toolbar { display: flex; }
        body.edit-mode .player-footer { display: none !important; }

        /* プレイヤー */
        .player-footer {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--border-color); padding: 10px 20px calc(15px + env(safe-area-inset-bottom));
            box-sizing: border-box; display: flex; align-items: center; gap: 12px; z-index: 100;
        }
        .now-playing-art { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .play-btn { font-size: 28px; background: none; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="view-title">ライブラリ</h2>
        <div>
            <button class="btn-ios" id="edit-mode-btn" onclick="toggleEditMode()">選択</button>
            <input type="file" id="audio-upload" accept="audio/*,.m4a,.mp3" multiple style="display:none;">
            <label for="audio-upload" class="btn-ios" style="background: var(--key-color); color: white;">追加</label>
        </div>
    </div>

    <div class="playlist-container" id="playlist"></div>

    <div class="edit-toolbar">
        <button class="btn-ios" onclick="deleteSelected()">一括消去</button>
        <button class="btn-ios" style="color:var(--text-main)" onclick="toggleEditMode()">完了</button>
    </div>

    <div class="player-footer" id="player-bar" style="display: none;">
        <img src="" id="np-art" class="now-playing-art">
        <div style="flex:1; overflow:hidden;">
            <div class="np-title" id="np-title" style="font-weight:600; font-size:14px;">曲名</div>
            <div id="np-artist" style="font-size:12px; color:var(--text-sub);">アーティスト</div>
        </div>
        <button class="play-btn" id="pp-btn" onclick="togglePlay()">▶︎</button>
        <audio id="audio-player"></audio>
    </div>

    <script>
        let db, tracks = [], selectedIds = [], isEditMode = false;
        const playlistEl = document.getElementById('playlist');
        const player = document.getElementById('audio-player');

        // DB初期化
        const request = indexedDB.open("MusicStudioV3", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; loadTracks(); };

        function loadTracks() {
            const transaction = db.transaction(["songs"], "readonly");
            transaction.objectStore("songs").getAll().onsuccess = (e) => {
                tracks = e.target.result;
                renderPlaylist();
            };
        }

        // 編集モード切替
        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('edit-mode-btn').textContent = isEditMode ? "キャンセル" : "選択";
            document.getElementById('edit-mode-btn').classList.toggle('active', isEditMode);
            selectedIds = [];
            renderPlaylist();
        }

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            tracks.forEach((track, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'track-wrapper';
                
                const isSelected = selectedIds.includes(track.id);
                const coverSrc = track.cover || 'https://via.placeholder.com/150?text=♪';

                wrapper.innerHTML = `
                    <div class="swipe-delete-btn" onclick="confirmDeleteOne(${track.id})">削除</div>
                    <div class="track-item" id="item-${track.id}" 
                         ontouchstart="handleTouchStart(event, ${track.id})" 
                         ontouchmove="handleTouchMove(event, ${track.id})" 
                         ontouchend="handleTouchEnd(event, ${track.id})">
                        <div class="select-checkbox ${isSelected ? 'checked' : ''}"></div>
                        <img src="${coverSrc}" class="list-art">
                        <div class="track-info-block" onclick="handleTrackClick(${index}, ${track.id})">
                            <div class="track-name">${track.name}</div>
                            <div class="track-artist">${track.artist}</div>
                        </div>
                    </div>
                `;
                playlistEl.appendChild(wrapper);
            });
        }

        // クリック時の挙動（通常時は再生、編集時は選択）
        function handleTrackClick(index, id) {
            if (isEditMode) {
                const pos = selectedIds.indexOf(id);
                if (pos > -1) selectedIds.splice(pos, 1);
                else selectedIds.push(id);
                renderPlaylist();
            } else {
                playTrack(index);
            }
        }

        // --- スワイプ削除のロジック ---
        let startX = 0, currentX = 0;
        function handleTouchStart(e, id) { 
            if(isEditMode) return;
            startX = e.touches[0].clientX; 
        }
        function handleTouchMove(e, id) {
            if(isEditMode) return;
            currentX = e.touches[0].clientX;
            const diff = startX - currentX;
            const item = document.getElementById(`item-${id}`);
            if (diff > 0 && diff < 100) item.style.transform = `translateX(-${diff}px)`;
        }
        function handleTouchEnd(e, id) {
            if(isEditMode) return;
            const item = document.getElementById(`item-${id}`);
            if (startX - currentX > 50) {
                item.style.transform = `translateX(-80px)`;
            } else {
                item.style.transform = `translateX(0)`;
            }
        }

        // 削除処理
        function confirmDeleteOne(id) {
            if (confirm("この曲をライブラリから削除しますか？")) {
                deleteFromDB([id]);
            } else {
                renderPlaylist(); // 位置を戻す
            }
        }

        function deleteSelected() {
            if (selectedIds.length === 0) return alert("曲が選択されていません");
            if (confirm(`${selectedIds.length}曲を一括削除しますか？`)) {
                deleteFromDB(selectedIds);
                toggleEditMode();
            }
        }

        function deleteFromDB(ids) {
            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");
            ids.forEach(id => store.delete(id));
            transaction.oncomplete = () => loadTracks();
        }

        // 再生・追加・その他は以前のロジックを継承
        document.getElementById('audio-upload').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) await processFile(file);
            loadTracks();
        });

        async function processFile(file) {
            return new Promise((resolve) => {
                jsmediatags.read(file, {
                    onSuccess: (tag) => {
                        const t = tag.tags;
                        let cv = null;
                        if (t.picture) {
                            const d = t.picture.data;
                            let s = "";
                            for (let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            cv = `data:${t.picture.format};base64,${btoa(s)}`;
                        }
                        const transaction = db.transaction(["songs"], "readwrite");
                        transaction.objectStore("songs").add({
                            name: t.title || file.name.replace(/\.[^/.]+$/, ""),
                            artist: t.artist || "不明なアーティスト",
                            cover: cv, data: file
                        });
                        transaction.oncomplete = () => resolve();
                    },
                    onError: () => {
                        const transaction = db.transaction(["songs"], "readwrite");
                        transaction.objectStore("songs").add({
                            name: file.name.replace(/\.[^/.]+$/, ""),
                            artist: "不明なアーティスト", cover: null, data: file
                        });
                        transaction.oncomplete = () => resolve();
                    }
                });
            });
        }

        function playTrack(index) {
            const track = tracks[index];
            player.src = URL.createObjectURL(track.data);
            document.getElementById('np-title').textContent = track.name;
            document.getElementById('np-artist').textContent = track.artist;
            document.getElementById('np-art').src = track.cover || 'https://via.placeholder.com/150?text=♪';
            document.getElementById('player-bar').style.display = 'flex';
            player.play();
        }

        function togglePlay() { player.paused ? player.play() : player.pause(); }
        player.onplay = () => document.getElementById('pp-btn').textContent = '⏸';
        player.onpause = () => document.getElementById('pp-btn').textContent = '▶︎';
    </script>
</body>
</html>
