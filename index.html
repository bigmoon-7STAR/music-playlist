<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --key-color: #FA2D55; --bg-color: #FFFFFF; --secondary-bg: #F2F2F7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-color); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .header { padding: calc(40px + env(safe-area-inset-top)) 20px 10px; background: white; border-bottom: 0.5px solid #ddd; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        #content { flex: 1; overflow-y: auto; padding-bottom: 180px; }
        
        /* エディットモードのスタイル */
        .card.editing { opacity: 0.8; }
        .edit-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .editing .edit-icon { display: block; }

        /* 編集モーダル */
        #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 7000; display: none; flex-direction: column; }
        .edit-form { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .edit-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .edit-label { font-size: 12px; color: #8e8e93; margin-bottom: -10px; font-weight: bold; }

        /* 表示形式 */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 15px; padding: 20px; }
        .list-view { display: flex; flex-direction: column; padding: 10px 20px; }
        .list-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 0.5px solid #f0f0f0; }
        .list-item img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; object-fit: cover; }
        .list-info { flex: 1; overflow: hidden; }

        /* 再生バー */
        .seeker-container { width: 100%; padding: 0 40px; margin-top: 20px; }
        .seeker { width: 100%; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.3); border-radius: 2px; outline: none; }
        .seeker::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; }

        .mini-player { position: fixed; bottom: calc(75px + env(safe-area-inset-bottom)); left: 12px; right: 12px; height: 64px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(25px); border-radius: 14px; display: none; align-items: center; padding: 0 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; }
        .full-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); visibility: hidden; }
        .full-player.active { transform: translateY(0); visibility: visible; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: calc(60px + env(safe-area-inset-bottom)); background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-top: 0.5px solid #ddd; display: flex; justify-content: space-around; padding-top: 10px; z-index: 500; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #8E8E93; font-size: 10px; border:none; background:none; width: 100%; }
        .tab-item.active { color: var(--key-color); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button id="left-btn" style="background:none; border:none; color:var(--key-color); font-weight:600;" onclick="handleHeaderLeft()">編集</button>
            <h2 id="view-title" style="margin:0; font-size:18px;">ライブラリ</h2>
            <button id="right-btn" style="background:none; border:none; color:var(--key-color); font-size:24px;" onclick="handleHeaderRight()"><i class="fa-solid fa-circle-plus"></i></button>
        </div>
    </div>

    <div id="content"><div id="main-display"></div></div>

    <div id="edit-modal">
        <div class="header">
            <div class="header-top">
                <button onclick="closeEdit()" style="color:var(--key-color); border:none; background:none;">キャンセル</button>
                <h2 style="font-size:17px;">情報を編集</h2>
                <button onclick="saveEdit()" style="color:var(--key-color); font-weight:bold; border:none; background:none;">保存</button>
            </div>
        </div>
        <div class="edit-form">
            <div class="edit-label">曲名</div>
            <input type="text" id="edit-name" class="edit-input">
            <div class="edit-label">アーティスト名</div>
            <input type="text" id="edit-artist" class="edit-input">
            <div class="edit-label">発行年 (西暦)</div>
            <input type="number" id="edit-year" class="edit-input" placeholder="2024">
        </div>
    </div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" style="width:44px; height:44px; border-radius:6px; margin-right:12px; object-fit:cover;">
        <div style="flex:1; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" id="m-title"></div>
        <i id="m-pp" class="fa-solid fa-play" style="font-size:24px; padding:10px;" onclick="event.stopPropagation(); togglePlay();"></i>
    </div>

    <div class="full-player" id="full">
        <div id="bg-blur" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1; filter:blur(60px) brightness(0.5); background-size:cover;"></div>
        <div onclick="closeFull()" style="padding: 20px; width: 100%;"><div style="width:40px; height:5px; border-radius:3px; background:rgba(255,255,255,0.4); margin: 0 auto;"></div></div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <img id="f-img" style="width:75vw; aspect-ratio:1/1; border-radius:15px; object-fit:cover; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <div style="width:100%; padding: 30px 40px 0; color:white;">
                <div id="f-title" style="font-size:22px; font-weight:800;"></div>
                <div id="f-artist" style="font-size:16px; color:var(--key-color); margin-top:5px;"></div>
            </div>
            <div class="seeker-container">
                <input type="range" class="seeker" id="seeker" value="0" step="0.1" oninput="audio.currentTime = this.value">
                <div style="display:flex; justify-content:space-between; color:rgba(255,255,255,0.6); font-size:11px; margin-top:8px;">
                    <span id="cur-time">0:00</span><span id="dur-time">0:00</span>
                </div>
            </div>
        </div>
        <div style="padding-bottom: 60px; display:flex; justify-content:space-around; align-items:center; color:white;">
            <i class="fa-solid fa-backward-step" style="font-size:30px;" onclick="prev()"></i>
            <i id="f-pp" class="fa-solid fa-play" style="font-size:55px;" onclick="togglePlay()"></i>
            <i class="fa-solid fa-forward-step" style="font-size:30px;" onclick="next()"></i>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" onclick="switchTab('library')" id="tab-lib"><i class="fa-solid fa-square-poll-vertical"></i><span>ライブラリ</span></button>
        <button class="tab-item" onclick="switchTab('playlist')" id="tab-play"><i class="fa-solid fa-music"></i><span>プレイリスト</span></button>
    </div>

    <input type="file" id="audio-upload" multiple style="display:none">
    <audio id="audio-element"></audio>

    <script>
        let db, tracks = [], playlists = [], isEditing = false, currentView = 'library', currentPlaylistId = null;
        let editingTrackId = null;
        const audio = document.getElementById('audio-element');

        const req = indexedDB.open("MusicStudioFinalV6", 1);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
        }

        // --- 編集モード ---
        function openEdit(id) {
            editingTrackId = id;
            const t = tracks.find(x => x.id === id);
            document.getElementById('edit-name').value = t.name;
            document.getElementById('edit-artist').value = t.artist || "";
            document.getElementById('edit-year').value = t.year || "";
            document.getElementById('edit-modal').style.display = 'flex';
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        function saveEdit() {
            const t = tracks.find(x => x.id === editingTrackId);
            t.name = document.getElementById('edit-name').value;
            t.artist = document.getElementById('edit-artist').value;
            t.year = parseInt(document.getElementById('edit-year').value) || 0;
            
            const tx = db.transaction("songs", "readwrite");
            tx.objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); };
        }

        // --- 表示系 ---
        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const leftBtn = document.getElementById('left-btn');
            
            if (currentView === 'library') {
                title.innerText = "ライブラリ"; leftBtn.innerText = isEditing ? "完了" : "編集";
                display.className = "grid";
                display.innerHTML = tracks.map(t => `
                    <div class="card ${isEditing ? 'editing' : ''}" onclick="${isEditing ? `openEdit(${t.id})` : `playSong(${t.id})`}">
                        <div class="edit-icon"><i class="fa-solid fa-pen-to-square"></i></div>
                        <img src="${t.cover || ''}" class="card-img" style="border-radius:12px; width:100%; aspect-ratio:1/1; object-fit:cover;">
                        <div style="margin-top:8px; font-size:14px; font-weight:600;">${t.name}</div>
                        <div style="font-size:11px; color:#8e8e93;">${t.artist || '不明'} (${t.year || '-'})</div>
                    </div>`).join('');
            } else if (currentPlaylistId === null) {
                title.innerText = "プレイリスト"; leftBtn.innerText = isEditing ? "完了" : "編集";
                display.className = "grid";
                display.innerHTML = playlists.map(p => `<div class="card" onclick="openPlaylist(${p.id})"><img src="${p.cover || ''}" class="card-img" style="background:#eee; border-radius:12px; width:100%; aspect-ratio:1/1; object-fit:cover;"><div style="margin-top:8px; font-size:14px; font-weight:600;">${p.name}</div></div>`).join('');
            } else {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                title.innerText = pl.name; leftBtn.innerText = "戻る";
                display.className = "list-view";
                const plSongs = tracks.filter(t => pl.songIds.includes(t.id));
                display.innerHTML = plSongs.map(t => `<div class="list-item" onclick="playSong(${t.id})"><img src="${t.cover || ''}"><div class="list-info"><div style="font-weight:600;">${t.name}</div><div style="font-size:12px; color:#888;">${t.artist}</div></div></div>`).join('');
            }
        }

        // --- 基本操作 ---
        function playSong(id) {
            const t = tracks.find(x => x.id === id);
            audio.src = URL.createObjectURL(t.data);
            document.getElementById('m-title').innerText = t.name;
            document.getElementById('m-img').src = t.cover || '';
            document.getElementById('f-title').innerText = t.name;
            document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('bg-blur').style.backgroundImage = `url(${t.cover})`;
            document.getElementById('mini').style.display = 'flex';
            audio.play();
        }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        audio.ontimeupdate = () => { if(!isNaN(audio.duration)){ document.getElementById('seeker').max = audio.duration; document.getElementById('seeker').value = audio.currentTime; document.getElementById('cur-time').innerText = formatTime(audio.currentTime); document.getElementById('dur-time').innerText = formatTime(audio.duration); } };
        function formatTime(s) { let m = Math.floor(s/60); let sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function handleHeaderLeft() { if (currentPlaylistId !== null) { currentPlaylistId = null; render(); } else { isEditing = !isEditing; render(); } }
        function handleHeaderRight() { if (currentView === 'library') document.getElementById('audio-upload').click(); else if (currentPlaylistId === null) createPlaylist(); }
        function switchTab(view) { currentView = view; currentPlaylistId = null; isEditing = false; render(); }
        function openPlaylist(id) { currentPlaylistId = id; render(); }
        function openFull() { document.getElementById('full').classList.add('active'); }
        function closeFull() { document.getElementById('full').classList.remove('active'); }
        function createPlaylist() { const name = prompt("プレイリスト名"); if (name) db.transaction("playlists", "readwrite").objectStore("playlists").add({name, cover: "", songIds: []}).oncomplete = loadAll; }

        document.getElementById('audio-upload').onchange = (e) => {
            for (let f of e.target.files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = "";
                        for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    db.transaction("songs","readwrite").objectStore("songs").add({ 
                        name: tag.tags.title || f.name, 
                        artist: tag.tags.artist || "不明", 
                        year: parseInt(tag.tags.year) || 0,
                        cover: c, data: f 
                    }).oncomplete = loadAll;
                }});
            }
        };
    </script>
</body>
</html>
