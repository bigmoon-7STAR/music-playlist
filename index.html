<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio Ultra Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --key-color: #FA2D55; --bg-color: #FFFFFF; --secondary-bg: #F2F2F7; --text-main: #000000; --text-sub: #8E8E93; --border-color: #D1D1D6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        .header { padding: calc(15px + env(safe-area-inset-top)) 20px 10px; border-bottom: 0.5px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: white; z-index: 100; }
        h2 { margin: 0; font-size: 22px; font-weight: 800; }

        .tab-bar { display: flex; justify-content: space-around; padding: 10px; border-bottom: 0.5px solid var(--border-color); font-size: 13px; font-weight: 600; color: var(--text-sub); background: white; }
        .tab { padding: 5px 15px; cursor: pointer; }
        .tab.active { color: var(--key-color); border-bottom: 2px solid var(--key-color); }

        .content-area { flex: 1; overflow-y: auto; padding-bottom: 160px; }

        /* --- スワイプ削除のためのスタイル --- */
        .track-wrapper { position: relative; overflow: hidden; border-bottom: 0.5px solid var(--border-color); background-color: #ff3b30; }
        .item-row { 
            display: flex; align-items: center; padding: 10px 20px; 
            background: white; position: relative; z-index: 2;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .swipe-delete-btn {
            position: absolute; right: 0; top: 0; height: 100%; width: 80px;
            background: #ff3b30; color: white; display: flex; align-items: center;
            justify-content: center; font-weight: 600; z-index: 1; font-size: 14px;
        }

        .list-art { width: 45px; height: 45px; border-radius: 6px; margin-right: 15px; object-fit: cover; background: var(--secondary-bg); }

        /* プレイヤー関連（略） */
        .player-footer { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 0.5px solid var(--border-color); padding: 10px 20px calc(15px + env(safe-area-inset-bottom)); box-sizing: border-box; z-index: 1000; }
        .controls-main { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .icon-btn { background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; }
        .icon-btn.active { color: var(--key-color); }

        .btn-ios { background: var(--secondary-bg); color: var(--key-color); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 13px; }

        /* モーダル */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 2000; display: none; flex-direction: column; }
        .pl-select-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 85%; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="view-title">ライブラリ</h2>
        <div>
            <button class="btn-ios" onclick="createNewPlaylist()" id="pl-create-btn" style="display:none;">新規作成</button>
            <input type="file" id="audio-upload" accept="audio/*,.m4a,.mp3" multiple style="display:none;">
            <label for="audio-upload" class="btn-ios" style="background: var(--key-color); color: white;">追加</label>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" id="tab-lib" onclick="switchTab('library')">ライブラリ</div>
        <div class="tab" id="tab-pl" onclick="switchTab('playlists')">プレイリスト</div>
        <div class="tab" id="tab-his" onclick="switchTab('history')">履歴</div>
    </div>

    <div class="content-area" id="main-content"></div>

    <div class="player-footer" id="player-bar" style="display: none;">
        <div class="player-top" onclick="showLyricsModal()" style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <img src="" id="np-art" style="width:45px; height:45px; border-radius:5px; object-fit:cover;">
            <div style="flex:1; overflow:hidden;">
                <div id="np-title" style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">曲名</div>
                <div id="np-artist" style="font-size:11px; color:var(--text-sub);">アーティスト</div>
            </div>
            <button class="icon-btn" onclick="event.stopPropagation(); showLyricsModal()"><i class="fa-solid fa-quote-right"></i></button>
        </div>
        <div class="controls-main">
            <button id="shuffle-btn" class="icon-btn" onclick="toggleShuffle()"><i class="fa-solid fa-shuffle"></i></button>
            <button class="icon-btn" onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
            <button id="pp-btn" class="icon-btn" style="font-size:35px;" onclick="togglePlay()"><i class="fa-solid fa-circle-play"></i></button>
            <button class="icon-btn" onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
            <button id="repeat-btn" class="icon-btn" onclick="toggleRepeat()"><i class="fa-solid fa-repeat"></i></button>
        </div>
        <audio id="audio-player"></audio>
    </div>

    <div class="full-modal" id="lyrics-modal">
        <div class="modal-header">
            <button class="btn-ios" onclick="closeLyricsModal()">閉じる</button>
            <h3 style="margin:0; font-size:16px;">歌詞</h3>
            <button class="btn-ios" onclick="toggleLyricsEdit()">編集</button>
        </div>
        <div class="lyrics-area" id="lyrics-display"></div>
        <div id="lyrics-edit-container" style="display:none; flex:1; padding:20px;">
            <textarea id="lyrics-input" style="width:100%; height:80%; border:none; font-size:16px; outline:none; resize:none;" placeholder="歌詞を入力..."></textarea>
            <button class="btn-ios" style="width:100%; background:var(--key-color); color:white;" onclick="saveLyrics()">保存</button>
        </div>
    </div>

    <div class="pl-select-modal" id="pl-modal" onclick="closePLModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="margin-top:0;">プレイリストに追加</h3>
            <div id="modal-pl-list"></div>
            <button class="btn-ios" style="width:100%; margin-top:15px;" onclick="closePLModal()">キャンセル</button>
        </div>
    </div>

    <script>
        let db, tracks = [], playlists = [], historyList = [], currentTab = 'library', currentPLId = null;
        let isShuffle = false, repeatMode = 0, currentIndex = -1;
        const player = document.getElementById('audio-player');

        const request = indexedDB.open("MusicStudioFinalDB", 3);
        request.onsuccess = (e) => { db = e.target.result; loadData(); };

        function loadData() {
            const trans = db.transaction(["songs", "playlists", "history"], "readonly");
            trans.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            trans.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; };
            trans.objectStore("history").getAll().onsuccess = (e) => { historyList = e.target.result.reverse(); };
        }

        function switchTab(tab) {
            currentTab = tab; currentPLId = null;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + (tab==='library'?'lib':tab==='playlists'?'pl':'his')).classList.add('active');
            document.getElementById('pl-create-btn').style.display = tab === 'playlists' ? 'inline-block' : 'none';
            render();
        }

        function render() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            
            let list = [];
            if(currentTab === 'library') list = tracks;
            else if(currentTab === 'playlists' && currentPLId === null) { playlists.forEach(p => createPLRow(container, p)); return; }
            else if(currentTab === 'playlists' && currentPLId !== null) {
                const pl = playlists.find(p => p.id === currentPLId);
                list = tracks.filter(t => pl.songIds.includes(t.id));
            } else if(currentTab === 'history') list = historyList;

            list.forEach(t => createTrackRowWithSwipe(container, t));
        }

        // --- スワイプ対応の行作成 ---
        let startX = 0, currentSwipeId = null;

        function createTrackRowWithSwipe(parent, t) {
            const wrapper = document.createElement('div');
            wrapper.className = 'track-wrapper';
            
            wrapper.innerHTML = `
                <div class="swipe-delete-btn" onclick="confirmDelete(${t.id})">削除</div>
                <div class="item-row" id="item-${t.id}" 
                     ontouchstart="ts(event, ${t.id})" 
                     ontouchmove="tm(event, ${t.id})" 
                     ontouchend="te(event, ${t.id})">
                    <img src="${t.cover || 'https://via.placeholder.com/150?text=♪'}" class="list-art">
                    <div style="flex:1; overflow:hidden;" onclick="playTrack(${t.id})">
                        <div style="font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.name}</div>
                        <div style="font-size:12px; color:var(--text-sub)">${t.artist}</div>
                    </div>
                    <button onclick="openPLModal(${t.id})" style="border:none; background:none; color:var(--key-color); font-size:22px; padding:10px;">+</button>
                </div>
            `;
            parent.appendChild(wrapper);
        }

        function ts(e, id) { startX = e.touches[0].clientX; currentSwipeId = id; }
        function tm(e, id) {
            let diff = startX - e.touches[0].clientX;
            const el = document.getElementById('item-' + id);
            if(diff > 0 && diff < 100) el.style.transform = `translateX(-${diff}px)`;
        }
        function te(e, id) {
            const el = document.getElementById('item-' + id);
            let diff = startX - e.changedTouches[0].clientX;
            if(diff > 50) el.style.transform = `translateX(-80px)`;
            else el.style.transform = `translateX(0)`;
        }

        function confirmDelete(id) {
            if(confirm("この曲を削除しますか？")) {
                const trans = db.transaction(["songs"], "readwrite");
                trans.objectStore("songs").delete(id).onsuccess = () => loadData();
            } else {
                render(); // 位置を戻す
            }
        }

        // プレイリスト用（略）
        function createPLRow(parent, p) {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <div class="list-art" style="background:#ddd; display:flex; align-items:center; justify-content:center; font-size:20px;">📁</div>
                <div style="flex:1" onclick="openPlaylist(${p.id})">
                    <div style="font-weight:600;">${p.name}</div>
                    <div style="font-size:12px; color:var(--text-sub)">${p.songIds.length}曲</div>
                </div>
                <button onclick="deletePL(${p.id})" style="border:none; background:none; color:var(--text-sub);"><i class="fa-solid fa-trash"></i></button>
            `;
            parent.appendChild(div);
        }

        function createNewPlaylist() {
            const name = prompt("プレイリスト名を入力してください");
            if(name) { db.transaction(["playlists"], "readwrite").objectStore("playlists").add({ name, songIds: [] }).onsuccess = () => loadData(); }
        }

        function openPlaylist(id) { currentPLId = id; render(); }
        function deletePL(id) { if(confirm("削除しますか？")) { db.transaction(["playlists"], "readwrite").objectStore("playlists").delete(id).onsuccess = () => loadData(); } }
        
        function openPLModal(id) {
            targetSongId = id;
            const list = document.getElementById('modal-pl-list');
            list.innerHTML = '';
            playlists.forEach(pl => {
                const b = document.createElement('button');
                b.className = 'btn-ios'; b.style = 'width:100%; margin-bottom:10px; text-align:left;';
                b.textContent = pl.name; b.onclick = () => addToPL(pl.id);
                list.appendChild(b);
            });
            document.getElementById('pl-modal').style.display = 'flex';
        }
        function addToPL(plId) {
            const pl = playlists.find(p => p.id === plId);
            if(!pl.songIds.includes(targetSongId)) {
                pl.songIds.push(targetSongId);
                db.transaction(["playlists"], "readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePLModal(); loadData(); };
            }
        }
        function closePLModal() { document.getElementById('pl-modal').style.display = 'none'; }

        // 再生機能・その他（略）
        function playTrack(id) {
            const t = tracks.find(x => x.id === id);
            currentIndex = tracks.indexOf(t);
            player.src = URL.createObjectURL(t.data);
            document.getElementById('np-title').textContent = t.name;
            document.getElementById('np-art').src = t.cover || 'https://via.placeholder.com/150?text=♪';
            document.getElementById('player-bar').style.display = 'block';
            db.transaction(["history"], "readwrite").objectStore("history").add({ ...t, id: undefined, originalId: t.id });
            player.play();
        }

        function togglePlay() { player.paused ? player.play() : player.pause(); }
        player.onplay = () => document.getElementById('pp-btn').querySelector('i').className = 'fa-solid fa-circle-pause';
        player.onpause = () => document.getElementById('pp-btn').querySelector('i').className = 'fa-solid fa-circle-play';
        function nextTrack() { let idx = currentIndex + 1; if(idx >= tracks.length) idx = 0; playTrack(tracks[idx].id); }
        function prevTrack() { let idx = currentIndex - 1; if(idx < 0) idx = tracks.length - 1; playTrack(tracks[idx].id); }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffle-btn').classList.toggle('active', isShuffle); }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('repeat-btn').classList.toggle('active', repeatMode > 0); }
        player.onended = () => { if(repeatMode === 2) player.play(); else nextTrack(); };

        // 歌詞関連
        function showLyricsModal() { document.getElementById('lyrics-display').textContent = tracks[currentIndex].lyrics || "歌詞なし"; document.getElementById('lyrics-modal').style.display = 'flex'; }
        function closeLyricsModal() { document.getElementById('lyrics-modal').style.display = 'none'; }
        function toggleLyricsEdit() {
            const area = document.getElementById('lyrics-display'), edit = document.getElementById('lyrics-edit-container');
            if(edit.style.display === 'none') { area.style.display = 'none'; edit.style.display = 'block'; document.getElementById('lyrics-input').value = tracks[currentIndex].lyrics || ""; }
            else { area.style.display = 'block'; edit.style.display = 'none'; }
        }
        function saveLyrics() {
            tracks[currentIndex].lyrics = document.getElementById('lyrics-input').value;
            db.transaction(["songs"], "readwrite").objectStore("songs").put(tracks[currentIndex]).onsuccess = () => { toggleLyricsEdit(); showLyricsModal(); };
        }

        // ファイル追加
        document.getElementById('audio-upload').addEventListener('change', async (e) => {
            for (const file of e.target.files) await processFile(file);
            loadData();
        });
        async function processFile(file) {
            return new Promise((res) => {
                jsmediatags.read(file, {
                    onSuccess: (tag) => {
                        const t = tag.tags; let cv = null;
                        if (t.picture) {
                            const d = t.picture.data; let s = "";
                            for (let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            cv = `data:${t.picture.format};base64,${btoa(s)}`;
                        }
                        db.transaction(["songs"], "readwrite").objectStore("songs").add({ name: t.title || file.name, artist: t.artist || "不明", cover: cv, data: file, lyrics: "" }).oncomplete = () => res();
                    },
                    onError: () => {
                        db.transaction(["songs"], "readwrite").objectStore("songs").add({ name: file.name, artist: "不明", cover: null, data: file, lyrics: "" }).oncomplete = () => res();
                    }
                });
            });
        }
    </script>
</body>
</html>
