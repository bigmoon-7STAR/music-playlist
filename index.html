<style>
/* --- 再生バー（seeker）の洗練されたデザイン --- */
.seeker {
    -webkit-appearance: none;
    width: 100%;
    height: 4px; /* 通常時は細く */
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
    outline: none;
    margin: 20px 0 10px;
    transition: height 0.2s;
}

.seeker:active {
    height: 6px; /* 操作時だけ少し太くして操作性を向上 */
}

.seeker::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 0; /* 通常時はつまみを隠す（Apple Music風） */
    height: 12px;
    width: 12px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 0.2s;
}

.seeker:active::-webkit-slider-thumb {
    transform: scale(1.5); /* 操作時だけつまみを大きく表示 */
}

/* --- ミニプレイヤーのスワイプ領域 --- */
.mini-player {
    touch-action: none; /* ブラウザのデフォルトスワイプを防止して独自実装を優先 */
    cursor: grab;
}
.mini-player:active { cursor: grabbing; }

/* 既存のスタイルに以下を追加/修正 */
.full-player {
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); /* より滑らかなアニメーション */
}
</style>

<script>
// --- スワイプで閉じる（ジェスチャー制御） ---
let startY = 0;
let currentY = 0;
const fullPlayer = document.getElementById('full');

// フルプレイヤーのヘッダー付近や全体でのスワイプ検知
fullPlayer.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
}, {passive: true});

fullPlayer.addEventListener('touchmove', (e) => {
    currentY = e.touches[0].clientY;
    let diff = currentY - startY;
    
    // 下方向へのスワイプ中、プレイヤーを少しずつ下げる（追従感）
    if (diff > 0) {
        fullPlayer.style.transform = `translateY(${diff}px)`;
        fullPlayer.style.transition = 'none'; // 動かしている間はアニメーションを切る
    }
}, {passive: true});

fullPlayer.addEventListener('touchend', (e) => {
    let diff = currentY - startY;
    fullPlayer.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
    
    if (diff > 100) {
        // 100px以上下げたら閉じる
        closeFull();
    } else {
        // それ以下なら元に戻す
        fullPlayer.style.transform = 'translateY(0)';
    }
    // 値をリセット
    startY = 0;
    currentY = 0;
});

// closeFull関数も少し修正（transformをリセットするため）
function closeFull() {
    fullPlayer.classList.remove('active');
    fullPlayer.style.transform = ''; // スワイプでの移動をリセット
    document.getElementById('lyrics-display').classList.remove('active');
}

// openFull関数も修正
function openFull() {
    fullPlayer.style.transform = 'translateY(0)';
    fullPlayer.classList.add('active');
}

/* --- 再生バーの「ダサさ」解消ロジック --- */
// 再生位置に応じてバーの色を変える（左側を白、右側を半透明に）
audio.ontimeupdate = () => { 
    if(!isNaN(audio.duration)){ 
        const seeker = document.getElementById('seeker');
        seeker.max = audio.duration; 
        seeker.value = audio.currentTime; 
        
        // 進捗率に合わせて背景グラデーションを更新
        const progress = (audio.currentTime / audio.duration) * 100;
        seeker.style.background = `linear-gradient(to right, #fff ${progress}%, rgba(255,255,255,0.2) ${progress}%)`;

        document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
        document.getElementById('dur-time').innerText = formatTime(audio.duration); 
    } 
};
</script>
